<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trading Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
–bg:#0a0b0e;
–s1:#111318;
–s2:#181b22;
–border:#1e2029;
–border2:#252830;
–text:#ffffff;
–dim:#8b8fa8;
–dimmer:#3a3d4a;
–green:#2dc08e;
–gbg:rgba(45,192,142,0.1);
–gborder:rgba(45,192,142,0.2);
–red:#f04f54;
–rbg:rgba(240,79,84,0.1);
–rborder:rgba(240,79,84,0.2);
–blue:#3b82f6;
–bbg:rgba(59,130,246,0.1);
–bborder:rgba(59,130,246,0.2);
–yellow:#f59e0b;
–f:‘Inter’,sans-serif;
}

body{background:var(–bg);color:var(–text);font-family:var(–f);max-width:390px;margin:0 auto;padding-bottom:68px;-webkit-font-smoothing:antialiased}

/* TABS */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:var(–s1);border-top:1px solid var(–border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:11px 0 9px;background:none;border:none;color:var(–dim);font-family:var(–f);font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color 0.2s}
.tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(–green)}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* HEADER */
.hdr{padding:18px 16px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(–green);background:var(–gbg);border:1px solid var(–gborder);padding:5px 10px;border-radius:20px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(–green);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.sync-btn{background:var(–s2);border:1px solid var(–border2);border-radius:8px;padding:7px 12px;color:var(–dim);font-family:var(–f);font-size:10px;font-weight:600;cursor:pointer;transition:all 0.2s}
.sync-btn:active{opacity:0.7}
.hdr-sub{font-size:11px;color:var(–dim);margin-top:2px}

/* CONTENT */
.content{padding:0 16px}

/* BALANCE HERO */
.bal-hero{background:var(–s1);border:1px solid var(–border);border-radius:14px;padding:20px;margin-bottom:10px}
.bal-lbl{font-size:11px;color:var(–dim);font-weight:500;margin-bottom:8px}
.bal-amt{font-size:34px;font-weight:800;letter-spacing:-0.5px}
.bal-amt span{font-size:18px;color:var(–dim);font-weight:500;margin-left:4px}
.bal-eur{font-size:12px;color:var(–dim);margin-top:5px}
.bal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;margin-top:16px;padding-top:16px;border-top:1px solid var(–border)}
.bal-item .bl{font-size:10px;color:var(–dim);font-weight:500;margin-bottom:5px}
.bal-item .bv{font-size:14px;font-weight:700}

/* PNL ROW */
.pnl-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pnl-box{border-radius:12px;padding:14px;border:1px solid}
.pnl-box.g{background:var(–gbg);border-color:var(–gborder)}
.pnl-box.r{background:var(–rbg);border-color:var(–rborder)}
.pnl-box.n{background:var(–s1);border-color:var(–border)}
.pnl-box .pl{font-size:10px;color:var(–dim);font-weight:500;margin-bottom:6px}
.pnl-box .pv{font-size:16px;font-weight:800}
.pnl-box .ps{font-size:11px;color:var(–dim);margin-top:3px}

/* SECTION */
.sec{font-size:11px;font-weight:600;color:var(–dim);margin:20px 0 10px;letter-spacing:0.3px}

/* POSITION CARD */
.pos-card{background:var(–s1);border:1px solid var(–border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.pos-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(–border)}
.pos-sym{font-size:15px;font-weight:700}
.pos-tags{display:flex;gap:6px;margin-top:5px}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:0.3px}
.pill-long{background:var(–gbg);color:var(–green);border:1px solid var(–gborder)}
.pill-short{background:var(–rbg);color:var(–red);border:1px solid var(–rborder)}
.pill-lev{background:var(–s2);color:var(–dim);border:1px solid var(–border2)}
.pos-right{text-align:right}
.roe-val{font-size:24px;font-weight:800;line-height:1}
.roe-lbl{font-size:10px;color:var(–dim);margin-top:2px}
.pnl-usdt{font-size:12px;margin-top:5px;font-weight:600}

.pos-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(–border)}
.ps-cell{padding:11px 16px;border-right:1px solid var(–border)}
.ps-cell:last-child{border-right:none}
.ps-cell .l{font-size:10px;color:var(–dim);font-weight:500;margin-bottom:4px}
.ps-cell .v{font-size:12px;font-weight:700}

.pos-lvls{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.lvl-row{display:flex;justify-content:space-between;align-items:center}
.lvl-row .lk{font-size:10px;color:var(–dim)}
.lvl-row .lp{font-size:13px;font-weight:700}
.lvl-row .ld{font-size:11px;font-weight:600}

/* MARKET */
.mkt-block{background:var(–s1);border:1px solid var(–border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.mkt-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(–border)}
.mkt-row:last-child{border-bottom:none}
.mkt-k{font-size:11px;color:var(–dim);font-weight:500}
.mkt-sub{font-size:10px;color:var(–dimmer);margin-top:2px}
.mkt-right{text-align:right}
.mkt-v{font-size:15px;font-weight:700}
.mkt-c{font-size:11px;font-weight:600;margin-top:2px}

/* FEAR GREED */
.fg-block{background:var(–s1);border:1px solid var(–border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.fg-ring{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;border:2px solid;flex-shrink:0}
.fg-lbl{font-size:10px;color:var(–dim);font-weight:500;margin-bottom:5px}
.fg-val{font-size:20px;font-weight:800}
.fg-sub{font-size:11px;color:var(–dim);margin-top:3px}

/* READING */
.reading-block{background:var(–s1);border:1px solid var(–border);border-radius:14px;padding:16px;margin-bottom:10px}
.reading-line{font-size:12px;color:var(–dim);line-height:1.9;padding:5px 0;border-bottom:1px solid var(–border)}
.reading-line:last-of-type{border-bottom:none}
.reading-line strong{color:var(–text);font-weight:600}
.conclusion{margin-top:12px;padding:11px 14px;border-radius:10px;font-size:12px;font-weight:700}
.c-bull{background:var(–gbg);border:1px solid var(–gborder);color:var(–green)}
.c-bear{background:var(–rbg);border:1px solid var(–rborder);color:var(–red)}
.c-mix{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:var(–yellow)}

/* HISTORIAL - SUBTABS */
.stabs{display:flex;background:var(–s1);border:1px solid var(–border);border-radius:10px;margin-bottom:14px;padding:3px}
.stab{flex:1;padding:9px;background:none;border:none;font-family:var(–f);font-size:11px;font-weight:600;color:var(–dim);cursor:pointer;border-radius:8px;transition:all 0.2s}
.stab.active{background:var(–s2);color:var(–text);border:1px solid var(–border2)}

/* MONTHLY SUMMARY */
.month-card{background:var(–s1);border:1px solid var(–border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.month-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(–border)}
.month-name{font-size:13px;font-weight:700}
.month-total{font-size:15px;font-weight:800}
.month-cats{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(–border)}
.mc-item{padding:14px 16px;border-right:1px solid var(–border)}
.mc-item:last-child{border-right:none}
.mc-label{font-size:10px;font-weight:700;letter-spacing:0.5px;margin-bottom:10px}
.mc-label.g{color:var(–green)}.mc-label.b{color:var(–blue)}
.mc-stat{display:flex;justify-content:space-between;margin-bottom:6px}
.mc-stat .k{font-size:11px;color:var(–dim)}
.mc-stat .v{font-size:11px;font-weight:700}
.month-foot{padding:10px 16px;font-size:11px;color:var(–dim)}

/* TRADE CARD */
.trade-card{background:var(–s1);border:1px solid var(–border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.trade-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(–border)}
.trade-sym{font-size:14px;font-weight:700}
.trade-meta{font-size:10px;color:var(–dim);margin-top:4px;display:flex;gap:6px;align-items:center}
.trade-pnl .pv{font-size:16px;font-weight:800;text-align:right}
.trade-pnl .ps{font-size:11px;color:var(–dim);text-align:right;margin-top:3px}
.trade-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(–border)}
.ts-cell{padding:10px 16px;border-right:1px solid var(–border)}
.ts-cell:last-child{border-right:none}
.ts-cell .l{font-size:10px;color:var(–dim);margin-bottom:3px}
.ts-cell .v{font-size:12px;font-weight:700}
.trade-cats{display:flex}
.cat-btn{flex:1;padding:11px 4px;background:none;border:none;border-right:1px solid var(–border);font-family:var(–f);font-size:10px;font-weight:600;color:var(–dim);cursor:pointer;transition:all 0.15s;line-height:1}
.cat-btn:last-child{border-right:none}
.cat-btn:active{opacity:0.6}
.cat-btn.sel-s{color:var(–green);background:var(–gbg)}
.cat-btn.sel-i{color:var(–blue);background:var(–bbg)}

/* EMPTY / ERROR / LOADING */
.empty{text-align:center;padding:50px 20px;color:var(–dim)}
.empty svg{width:36px;height:36px;stroke:var(–dimmer);margin-bottom:12px}
.empty p{font-size:13px;font-weight:500}
.err-box{background:var(–rbg);border:1px solid var(–rborder);border-radius:12px;padding:14px 16px;font-size:12px;color:var(–red);margin-bottom:10px}
.loading{text-align:center;padding:50px 20px;color:var(–dim)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(–border2);border-top-color:var(–green);border-radius:50%;animation:rot 0.7s linear infinite;margin-bottom:12px}
@keyframes rot{to{transform:rotate(360deg)}}
.loading p{font-size:12px}

/* COLORS */
.green{color:var(–green)}.red{color:var(–red)}.blue{color:var(–blue)}.dim{color:var(–dim)}.yellow{color:var(–yellow)}
</style>

</head>
<body>

<!-- ═══ CUENTA ═══ -->

<div id="page-cuenta" class="page active">
  <div class="hdr">
    <div>
      <div class="hdr-title">Cuenta</div>
      <div class="hdr-sub" id="cuenta-ts">—</div>
    </div>
    <div class="hdr-right">
      <button class="sync-btn" onclick="loadCuenta()">↻ Sync</button>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>
  <div class="content" id="cuenta-content">
    <div class="loading"><div class="spin"></div><p>Conectando...</p></div>
  </div>
</div>

<!-- ═══ POSICIONES ═══ -->

<div id="page-pos" class="page">
  <div class="hdr">
    <div>
      <div class="hdr-title">Posiciones</div>
      <div class="hdr-sub">USDT-M · Futuros Perpetuos</div>
    </div>
    <button class="sync-btn" onclick="loadPositions()">↻ Sync</button>
  </div>
  <div class="content" id="pos-content">
    <div class="loading"><div class="spin"></div><p>Cargando...</p></div>
  </div>
</div>

<!-- ═══ MERCADO ═══ -->

<div id="page-mkt" class="page">
  <div class="hdr">
    <div>
      <div class="hdr-title">Mercado</div>
      <div class="hdr-sub" id="mkt-ts">—</div>
    </div>
    <button class="sync-btn" onclick="loadMarket()">↻ Sync</button>
  </div>
  <div class="content" id="mkt-content">
    <div class="loading"><div class="spin"></div><p>Cargando...</p></div>
  </div>
</div>

<!-- ═══ HISTORIAL ═══ -->

<div id="page-hist" class="page">
  <div class="hdr">
    <div>
      <div class="hdr-title">Historial</div>
      <div class="hdr-sub">Últimos 90 días · USDT-M</div>
    </div>
    <button class="sync-btn" onclick="loadHistory()">↻ Sync</button>
  </div>
  <div class="content">
    <div class="stabs">
      <button class="stab active" onclick="showStab('res',this)">Resumen</button>
      <button class="stab" onclick="showStab('swg',this)">Swing</button>
      <button class="stab" onclick="showStab('int',this)">Intradía</button>
      <button class="stab" onclick="showStab('unc',this)">Sin cat.</button>
    </div>
    <div id="sub-res"><div class="loading"><div class="spin"></div><p>Cargando...</p></div></div>
    <div id="sub-swg" style="display:none"></div>
    <div id="sub-int" style="display:none"></div>
    <div id="sub-unc" style="display:none"></div>
  </div>
</div>

<!-- TABS -->

<div class="tabs">
  <button class="tab active" onclick="showTab('cuenta',this)">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Cuenta
  </button>
  <button class="tab" onclick="showTab('pos',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    Posiciones
  </button>
  <button class="tab" onclick="showTab('mkt',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    Mercado
  </button>
  <button class="tab" onclick="showTab('hist',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Historial
  </button>
</div>

<script>
// ════════════════════════════
// CONSTANTS
// ════════════════════════════
const EUR = 1.12;
const CAT_KEY = 'trade_cats_v1';

// ════════════════════════════
// UTILS
// ════════════════════════════
const f2 = n => parseFloat(n||0).toFixed(2);
const f4 = n => parseFloat(n||0).toFixed(4);
const pct = n => { const v=parseFloat(n||0); return (v>=0?'+':'')+v.toFixed(2)+'%'; };
const usdt = n => { const v=parseFloat(n||0); return (v>=0?'+':'')+f2(v)+' USDT'; };
const eur = n => (parseFloat(n||0)/EUR).toFixed(2)+' EUR';
const ts = () => new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const distPct = (from,to) => ((to-from)/Math.abs(from)*100).toFixed(2);
const fmtNum = n => parseFloat(n||0).toLocaleString('es-ES',{maximumFractionDigits:6});
const fmtK = n => { n=parseFloat(n||0); return n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n.toFixed(2); };
const monthKey = d => { const dt=new Date(d); return dt.getFullYear()+'-'+(dt.getMonth()+1); };
const monthLabel = k => { const [y,m]=k.split('-'); return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)-1]+' '+y; };

// Category storage
function getCats(){ return JSON.parse(localStorage.getItem(CAT_KEY)||'{}'); }
function setCat(id, cat){ const c=getCats(); c[id]=cat; localStorage.setItem(CAT_KEY,JSON.stringify(c)); }
function getCat(id){ return getCats()[id]||'unc'; }

// ════════════════════════════
// TABS
// ════════════════════════════
function showTab(tab, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='cuenta') loadCuenta();
  if(tab==='pos') loadPositions();
  if(tab==='mkt') loadMarket();
  if(tab==='hist') loadHistory();
}

function showStab(id, btn){
  ['res','swg','int','unc'].forEach(s=>{ const el=document.getElementById('sub-'+s); if(el)el.style.display='none'; });
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('sub-'+id);
  if(el)el.style.display='block';
  btn.classList.add('active');
}

// ════════════════════════════
// API
// ════════════════════════════
async function api(endpoint){
  const r = await fetch(`/.netlify/functions/bitget-positions?endpoint=${endpoint}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ════════════════════════════
// PRICES
// ════════════════════════════
let prices = {};
async function fetchPrices(syms){
  try{
    const unique=[...new Set(syms.map(s=>s.endsWith('USDT')?s:s+'USDT'))];
    if(!unique.length)return;
    const data=await fetch('https://api.binance.com/api/v3/ticker/24hr?symbols='+JSON.stringify(unique)).then(r=>r.json());
    data.forEach(t=>{ prices[t.symbol]={p:parseFloat(t.lastPrice),c:parseFloat(t.priceChangePercent)}; });
  }catch(e){}
}

// ════════════════════════════
// CUENTA
// ════════════════════════════
async function loadCuenta(){
  const el=document.getElementById('cuenta-content');
  el.innerHTML=loading();
  try{
    // Load balance + this month realized from history in parallel
    const [balData, histData] = await Promise.allSettled([api('balance'), api('history')]);

    if(balData.status==='rejected'||balData.value.code!=='00000') throw new Error(balData.value?.msg||'Error API balance');

    const acc = balData.value.data[0];
    const equity   = parseFloat(acc.accountEquity||acc.usdtEquity||0);
    const avail    = parseFloat(acc.available||0);
    const isoMargin= parseFloat(acc.isolatedMargin||0);
    const unrealized=parseFloat(acc.unrealizedPL||0);
    const marginRatio=parseFloat(acc.crossedRiskRate||acc.marginRatio||0)*100;

    // Realized this month from history + breakdown by category
    let realizedMonth = 0;
    let swingMonth = 0;
    let intraMonth = 0;
    if(histData.status==='fulfilled'&&histData.value.code==='00000'){
      const mk=monthKey(Date.now());
      const orders=histData.value.data?.entrustedList||histData.value.data?.orderList||histData.value.data?.list||(Array.isArray(histData.value.data)?histData.value.data:[]);
      orders.filter(o=>(o.status==='filled'||o.status==='full_fill')&&o.tradeSide==='close').forEach(o=>{
        if(monthKey(parseInt(o.cTime||o.uTime||0))===mk){
          const pnl=parseFloat(o.totalProfits||0);
          const id=o.orderId||o.clientOid||'';
          const cat=getCat(id);
          realizedMonth+=pnl;
          if(cat==='swg') swingMonth+=pnl;
          else if(cat==='int') intraMonth+=pnl;
        }
      });
    }

    document.getElementById('cuenta-ts').textContent='Sync: '+ts();

    const unrealizedClass=unrealized>=0?'g':'r';
    const realizedClass=realizedMonth>=0?'g':'r';
    const curMonth=monthLabel(monthKey(Date.now()));

    el.innerHTML=`
      <div class="bal-hero">
        <div class="bal-lbl">Balance Total USDT-M</div>
        <div class="bal-amt">${fmtK(equity)}<span>USDT</span></div>
        <div class="bal-eur">≈ ${eur(equity)}</div>
        <div class="bal-grid">
          <div class="bal-item"><div class="bl">Disponible</div><div class="bv green">${f2(avail)}</div></div>
          <div class="bal-item"><div class="bl">En Margen</div><div class="bv">${f2(isoMargin)}</div></div>
          <div class="bal-item"><div class="bl">Ratio Margen</div><div class="bv ${marginRatio>80?'red':marginRatio>50?'yellow':'green'}">${f2(marginRatio)}%</div></div>
        </div>
      </div>
      <div class="pnl-row">
        <div class="pnl-box ${unrealizedClass}">
          <div class="pl">No Realizado</div>
          <div class="pv ${unrealized>=0?'green':'red'}">${usdt(unrealized)}</div>
          <div class="ps">≈ ${eur(unrealized)}</div>
        </div>
        <div class="pnl-box ${realizedClass}">
          <div class="pl">Realizado ${curMonth}</div>
          <div class="pv ${realizedMonth>=0?'green':'red'}">${usdt(realizedMonth)}</div>
          <div class="ps">≈ ${eur(realizedMonth)}</div>
        </div>
      </div>

let cachedOrders = [];

async function loadHistory(){
  // Reset all subtabs
  ['swg','int','unc'].forEach(s=>{ document.getElementById('sub-'+s).innerHTML=''; });
  document.getElementById('sub-res').innerHTML=loading();

  try{
    const data=await api('history');
    if(data.code!=='00000') throw new Error(data.msg||'Error API historial');

    const raw=data.data?.entrustedList||data.data?.orderList||data.data?.list||(Array.isArray(data.data)?data.data:[]);
    // Only filled close orders (tradeSide=close) — these have PnL
    const orders=raw.filter(o=>(o.status==='filled'||o.status==='full_fill')&&o.tradeSide==='close');

    cachedOrders=orders.map(o=>{
      const id=o.orderId||o.clientOid||String(Math.random());
      const sym=o.symbol||'';
      const base=sym.replace('USDT','');
      const side=o.posSide||o.side||'';
      const lev=parseInt(o.leverage||1);
      const entry=parseFloat(o.posAvg||0);           // avg entry price of the position
      const exitP=parseFloat(o.priceAvg||0);          // execution price of the close order
      const pnl=parseFloat(o.totalProfits||0);
      const quoteVol=parseFloat(o.quoteVolume||0);    // position value at close
      const margin=quoteVol>0&&lev>0?(quoteVol/lev):0;
      const roe=margin>0?(pnl/margin*100):0;
      const qty=parseFloat(o.baseVolume||o.size||0);
      const tms=parseInt(o.cTime||o.uTime||Date.now());
      const cat=getCat(id);
      return {id,sym,base,side,lev,entry,exitP,pnl,margin,roe,qty,tms,cat};
    });

    renderHistory();
  }catch(e){
    document.getElementById('sub-res').innerHTML=errBox(e.message);
  }
}

function setCategory(id, cat){
  setCat(id, cat);
  // Update cached
  const idx=cachedOrders.findIndex(o=>o.id===id);
  if(idx>=0) cachedOrders[idx].cat=cat;
  renderHistory();
  // Keep current subtab active
}

function renderHistory(){
  const swing=cachedOrders.filter(o=>o.cat==='swg');
  const intra=cachedOrders.filter(o=>o.cat==='int');
  const unc=cachedOrders.filter(o=>o.cat==='unc');

  // ─ RESUMEN ─
  const months={};
  cachedOrders.forEach(o=>{
    const mk=monthKey(o.tms);
    if(!months[mk]) months[mk]={swing:{pnl:0,roe:[],wins:0,total:0},intra:{pnl:0,roe:[],wins:0,total:0},unc:0};
    if(o.cat==='swg'){ months[mk].swing.pnl+=o.pnl; months[mk].swing.roe.push(o.roe); if(o.pnl>0)months[mk].swing.wins++; months[mk].swing.total++; }
    else if(o.cat==='int'){ months[mk].intra.pnl+=o.pnl; months[mk].intra.roe.push(o.roe); if(o.pnl>0)months[mk].intra.wins++; months[mk].intra.total++; }
    else months[mk].unc++;
  });

  const avgRoe=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;

  let resHtml='';
  if(!Object.keys(months).length){
    resHtml=emptyState('Sin trades en los últimos 90 días');
  } else {
    Object.keys(months).sort((a,b)=>b.localeCompare(a)).forEach(mk=>{
      const m=months[mk];
      const totalPnl=m.swing.pnl+m.intra.pnl;
      resHtml+=`
      <div class="month-card">
        <div class="month-head">
          <div class="month-name">${monthLabel(mk)}</div>
          <div class="month-total ${totalPnl>=0?'green':'red'}">${usdt(totalPnl)}</div>
        </div>
        <div class="month-cats">
          <div class="mc-item">
            <div class="mc-label g">SWING</div>
            <div class="mc-stat"><span class="k">PnL</span><span class="v ${m.swing.pnl>=0?'green':'red'}">${usdt(m.swing.pnl)}</span></div>
            <div class="mc-stat"><span class="k">Trades</span><span class="v">${m.swing.total}</span></div>
            <div class="mc-stat"><span class="k">Win rate</span><span class="v">${m.swing.total?Math.round(m.swing.wins/m.swing.total*100):0}%</span></div>
            <div class="mc-stat"><span class="k">ROE medio</span><span class="v ${avgRoe(m.swing.roe)>=0?'green':'red'}">${(avgRoe(m.swing.roe)>=0?'+':'')+avgRoe(m.swing.roe).toFixed(2)}%</span></div>
          </div>
          <div class="mc-item">
            <div class="mc-label b">INTRADÍA</div>
            <div class="mc-stat"><span class="k">PnL</span><span class="v ${m.intra.pnl>=0?'green':'red'}">${usdt(m.intra.pnl)}</span></div>
            <div class="mc-stat"><span class="k">Trades</span><span class="v">${m.intra.total}</span></div>
            <div class="mc-stat"><span class="k">Win rate</span><span class="v">${m.intra.total?Math.round(m.intra.wins/m.intra.total*100):0}%</span></div>
            <div class="mc-stat"><span class="k">ROE medio</span><span class="v ${avgRoe(m.intra.roe)>=0?'green':'red'}">${(avgRoe(m.intra.roe)>=0?'+':'')+avgRoe(m.intra.roe).toFixed(2)}%</span></div>
          </div>
        </div>
        ${m.unc>0?`<div class="month-foot">${m.unc} trade${m.unc>1?'s':''} sin categorizar</div>`:''}
      </div>`;
    });
  }
  document.getElementById('sub-res').innerHTML=resHtml;

  // ─ SWING ─
  document.getElementById('sub-swg').innerHTML=swing.length?swing.map(o=>tradeCard(o)).join(''):emptyState('Sin trades categorizados como Swing');

  // ─ INTRADÍA ─
  document.getElementById('sub-int').innerHTML=intra.length?intra.map(o=>tradeCard(o)).join(''):emptyState('Sin trades categorizados como Intradía');

  // ─ SIN CATEGORIZAR ─
  document.getElementById('sub-unc').innerHTML=unc.length?unc.map(o=>tradeCard(o)).join(''):emptyState('Todos los trades están categorizados ✅');
}

function tradeCard(o){
  const dt=new Date(o.tms);
  const dateStr=dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})+' · '+dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const sidePill=o.side.toLowerCase().includes('long')||o.side==='buy'?'<span class="pill pill-long">LONG</span>':'<span class="pill pill-short">SHORT</span>';
  return `
  <div class="trade-card">
    <div class="trade-head">
      <div>
        <div class="trade-sym">${o.base}<span class="dim" style="font-size:11px">/USDT</span></div>
        <div class="trade-meta">${sidePill}<span style="margin-left:2px">${o.lev}x · ${dateStr}</span></div>
      </div>
      <div class="trade-pnl">
        <div class="pv ${o.pnl>=0?'green':'red'}">${usdt(o.pnl)}</div>
        <div class="ps">≈ ${eur(o.pnl)}</div>
      </div>
    </div>
    <div class="trade-stats">
      <div class="ts-cell"><div class="l">Entrada</div><div class="v">${o.entry>0?fmtNum(o.entry):'—'}</div></div>
      <div class="ts-cell"><div class="l">Salida</div><div class="v">${o.exitP>0?fmtNum(o.exitP):'—'}</div></div>
      <div class="ts-cell"><div class="l">ROE</div><div class="v ${o.roe>=0?'green':'red'}">${(o.roe>=0?'+':'')+f2(o.roe)}%</div></div>
    </div>
    <div class="trade-cats">
      <button class="cat-btn ${o.cat==='swg'?'sel-s':''}" onclick="setCategory('${o.id}','swg')">Swing</button>
      <button class="cat-btn ${o.cat==='int'?'sel-i':''}" onclick="setCategory('${o.id}','int')">Intradía</button>
      <button class="cat-btn ${o.cat==='unc'?'':''}" onclick="setCategory('${o.id}','unc')">Sin cat.</button>
    </div>
  </div>`;
}

// ════════════════════════════
// HELPERS
// ════════════════════════════
function loading(){ return `<div class="loading"><div class="spin"></div><p>Cargando...</p></div>`; }
function emptyState(msg){ return `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${msg}</p></div>`; }
function errBox(msg){ return `<div class="err-box">⚠️ ${msg}</div><p style="font-size:11px;color:var(--dim);padding:4px 0">Verifica la API key y los permisos en Netlify.</p>`; }

// ════════════════════════════
// INIT
// ════════════════════════════
window.addEventListener('load',()=>{
  loadCuenta();
  setInterval(()=>{
    const active=document.querySelector('.tab.active')?.textContent?.trim();
    if(active==='Cuenta') loadCuenta();
    if(active==='Posiciones') loadPositions();
    if(active==='Mercado') loadMarket();
  }, 30000);
});
</script>

</body>
</html>
