<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trading Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#07080d;
  --surface:#0d0f18;
  --card:#111422;
  --border:#1c1f30;
  --border2:#252840;
  --text:#e8eaf6;
  --muted:#5a5f7a;
  --dim:#3a3f5a;
  --green:#00e5a0;
  --green2:rgba(0,229,160,0.12);
  --red:#ff3d6b;
  --red2:rgba(255,61,107,0.12);
  --yellow:#f5c842;
  --yellow2:rgba(245,200,66,0.12);
  --blue:#4d7fff;
  --blue2:rgba(77,127,255,0.12);
  --purple:#a855f7;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  max-width:430px;
  margin:0 auto;
  padding-bottom:72px;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  top:-200px;left:-100px;
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(0,229,160,0.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ─── TABS ─── */
.tabs{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{
  flex:1;padding:10px 0 8px;
  background:none;border:none;
  color:var(--muted);font-family:var(--sans);
  font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:color 0.2s;
}
.tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--green)}

/* ─── PAGES ─── */
.page{display:none;padding:16px;position:relative;z-index:1}
.page.active{display:block}

/* ─── HEADER ─── */
.hdr{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:20px 16px 0;margin-bottom:4px;position:relative;z-index:1;
}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;line-height:1}
.hdr-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:4px;letter-spacing:0.5px}
.live-pill{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;
  color:var(--green);
  background:var(--green2);
  border:1px solid rgba(0,229,160,0.25);
  padding:5px 10px;border-radius:20px;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* ─── CARDS ─── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:10px;
}
.card-sm{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
}

/* ─── BALANCE HERO ─── */
.balance-hero{
  background:linear-gradient(135deg,#0d1225 0%,#111422 50%,#0d1020 100%);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:24px 20px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}
.balance-hero::before{
  content:'';
  position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;
  background:radial-gradient(circle,rgba(0,229,160,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.balance-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:var(--mono)}
.balance-amount{font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1;font-family:var(--mono)}
.balance-eur{font-size:13px;color:var(--muted);margin-top:6px;font-family:var(--mono)}
.balance-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:18px}
.balance-item .bl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.balance-item .bv{font-size:13px;font-weight:700;font-family:var(--mono)}

/* ─── PNL STRIP ─── */
.pnl-strip{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pnl-card{
  border-radius:12px;padding:14px;
  border:1px solid;
}
.pnl-card.green{background:var(--green2);border-color:rgba(0,229,160,0.2)}
.pnl-card.red{background:var(--red2);border-color:rgba(255,61,107,0.2)}
.pnl-card.blue{background:var(--blue2);border-color:rgba(77,127,255,0.2)}
.pnl-card.yellow{background:var(--yellow2);border-color:rgba(245,200,66,0.2)}
.pnl-card .pl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:var(--mono)}
.pnl-card .pv{font-size:16px;font-weight:800;font-family:var(--mono)}
.pnl-card .ps{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono)}

/* ─── SECTION LABEL ─── */
.sec{
  font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin:18px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ─── POSITION CARD ─── */
.pos{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:10px;
}
.pos-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.pos-sym{font-size:17px;font-weight:800;letter-spacing:-0.3px}
.pos-badges{display:flex;align-items:center;gap:6px;margin-top:4px}
.badge{font-size:9px;font-weight:800;letter-spacing:0.8px;padding:3px 8px;border-radius:6px;font-family:var(--mono)}
.badge-long{background:var(--green2);color:var(--green);border:1px solid rgba(0,229,160,0.3)}
.badge-short{background:var(--red2);color:var(--red);border:1px solid rgba(255,61,107,0.3)}
.badge-lev{background:var(--blue2);color:var(--blue);border:1px solid rgba(77,127,255,0.3)}
.pos-roe{text-align:right}
.pos-roe .rv{font-size:24px;font-weight:800;font-family:var(--mono);line-height:1}
.pos-roe .rl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);font-family:var(--mono)}
.up{color:var(--green)}.down{color:var(--red)}

.pos-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.ps-item{background:var(--bg);border-radius:10px;padding:9px 10px}
.ps-item .l{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:0.5px;margin-bottom:4px;font-family:var(--mono)}
.ps-item .v{font-size:12px;font-weight:700;font-family:var(--mono)}

.pos-levels{display:flex;flex-direction:column;gap:5px}
.lvl{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:9px;background:var(--bg)}
.lvl .ll{font-size:10px;color:var(--muted);font-weight:700;font-family:var(--mono)}
.lvl .lp{font-size:12px;font-weight:700;font-family:var(--mono)}
.lvl .ld{font-size:10px;font-weight:700;font-family:var(--mono)}

/* ─── MARKET CARDS ─── */
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mkt-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.mkt-card .ml{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono)}
.mkt-card .mv{font-size:18px;font-weight:800;font-family:var(--mono);line-height:1}
.mkt-card .mc{font-size:10px;margin-top:4px;font-weight:700;font-family:var(--mono)}
.mkt-card .ms{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono)}

/* ─── FG CARD ─── */
.fg-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px;margin-bottom:10px;
  display:flex;align-items:center;gap:16px;
}
.fg-ring{
  width:70px;height:70px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;font-family:var(--mono);
  border:3px solid var(--border);flex-shrink:0;
}
.fg-info .fl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:var(--mono)}
.fg-info .fv{font-size:20px;font-weight:800;line-height:1}
.fg-info .fs{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono)}

/* ─── HISTORY ─── */
.hist-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px;margin-bottom:8px;
}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hist-sym{font-size:14px;font-weight:800}
.hist-date{font-size:10px;color:var(--muted);font-family:var(--mono)}
.hist-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.hist-item2{font-size:11px;color:var(--muted);font-family:var(--mono)}
.hist-item2 span{color:var(--text);font-weight:700}
.hist-pnl{font-size:16px;font-weight:800;font-family:var(--mono);margin-top:10px}

/* ─── SIGNAL ROW ─── */
.sig-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
  font-size:12px;
}
.sig-row:last-child{border-bottom:none}
.sig-k{color:var(--muted);font-size:11px;font-family:var(--mono)}
.sig-v{font-weight:700;font-family:var(--mono)}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty svg{width:40px;height:40px;stroke:var(--dim);margin-bottom:12px}
.empty p{font-size:13px;font-weight:600}

/* ─── SPINNER ─── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:rot 0.7s linear infinite;vertical-align:middle}
@keyframes rot{to{transform:rotate(360deg)}}

/* ─── ERROR PILL ─── */
.err-pill{
  background:var(--red2);border:1px solid rgba(255,61,107,0.3);
  border-radius:10px;padding:12px 14px;
  font-size:12px;color:var(--red);font-family:var(--mono);
  margin-bottom:10px;
}

/* ─── REFRESH BTN ─── */
.refresh-btn{
  background:none;border:1px solid var(--border2);border-radius:8px;
  padding:7px 12px;color:var(--muted);font-family:var(--mono);
  font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;
  transition:all 0.2s;display:flex;align-items:center;gap:6px;
}
.refresh-btn:hover{border-color:var(--green);color:var(--green)}

/* ─── DIVIDER ─── */
.div{height:1px;background:var(--border);margin:16px 0}

/* ─── SIGNAL CONCLUSION ─── */
.conclusion{
  border-radius:12px;padding:14px;margin-top:12px;
  font-size:13px;font-weight:700;
}
.conclusion.bull{background:var(--green2);border:1px solid rgba(0,229,160,0.25);color:var(--green)}
.conclusion.bear{background:var(--red2);border:1px solid rgba(255,61,107,0.25);color:var(--red)}
.conclusion.mix{background:var(--yellow2);border:1px solid rgba(245,200,66,0.25);color:var(--yellow)}
</style>
</head>
<body>

<!-- ═══════ PAGE: CUENTA ═══════ -->
<div id="page-cuenta" class="page active">
  <div class="hdr">
    <div>
      <div class="hdr-title">Cuenta</div>
      <div class="hdr-sub" id="cuenta-update">—</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="refresh-btn" onclick="loadCuenta()">
        <svg viewBox="0 0 24 24" style="width:12px;height:12px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        SYNC
      </button>
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>

  <div style="padding:0 16px">
    <div id="cuenta-content">
      <div style="text-align:center;padding:60px 0;color:var(--muted)">
        <div class="spin" style="width:24px;height:24px;margin:0 auto 12px"></div>
        <div style="font-size:12px;font-family:var(--mono)">Conectando con Bitget...</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════ PAGE: POSICIONES ═══════ -->
<div id="page-pos" class="page">
  <div class="hdr">
    <div>
      <div class="hdr-title">Posiciones</div>
      <div class="hdr-sub">USDT-M · Futuros Perpetuos</div>
    </div>
    <button class="refresh-btn" onclick="loadPositions()">
      <svg viewBox="0 0 24 24" style="width:12px;height:12px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      SYNC
    </button>
  </div>
  <div style="padding:0 16px">
    <div id="pos-content">
      <div style="text-align:center;padding:60px 0;color:var(--muted)">
        <div class="spin" style="width:24px;height:24px;margin:0 auto 12px"></div>
        <div style="font-size:12px;font-family:var(--mono)">Cargando posiciones...</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════ PAGE: MERCADO ═══════ -->
<div id="page-mkt" class="page">
  <div class="hdr">
    <div>
      <div class="hdr-title">Mercado</div>
      <div class="hdr-sub" id="mkt-update">—</div>
    </div>
    <button class="refresh-btn" onclick="loadMarket()">
      <svg viewBox="0 0 24 24" style="width:12px;height:12px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      SYNC
    </button>
  </div>
  <div style="padding:0 16px" id="mkt-content">
    <div style="text-align:center;padding:60px 0;color:var(--muted)">
      <div class="spin" style="width:24px;height:24px;margin:0 auto 12px"></div>
      <div style="font-size:12px;font-family:var(--mono)">Cargando datos de mercado...</div>
    </div>
  </div>
</div>

<!-- ═══════ PAGE: HISTORIAL ═══════ -->
<div id="page-hist" class="page">
  <div class="hdr">
    <div>
      <div class="hdr-title">Historial</div>
      <div class="hdr-sub">Últimos 90 días · USDT-M</div>
    </div>
    <button class="refresh-btn" onclick="loadHistory()">
      <svg viewBox="0 0 24 24" style="width:12px;height:12px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      SYNC
    </button>
  </div>
  <div style="padding:0 16px">
    <div id="hist-content">
      <div style="text-align:center;padding:60px 0;color:var(--muted)">
        <div class="spin" style="width:24px;height:24px;margin:0 auto 12px"></div>
        <div style="font-size:12px;font-family:var(--mono)">Cargando historial...</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════ TABS ═══════ -->
<div class="tabs">
  <button class="tab active" onclick="showTab('cuenta',this)">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    CUENTA
  </button>
  <button class="tab" onclick="showTab('pos',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    POSICIONES
  </button>
  <button class="tab" onclick="showTab('mkt',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    MERCADO
  </button>
  <button class="tab" onclick="showTab('hist',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    HISTORIAL
  </button>
</div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const EUR_RATE = 1.12; // approx, could be made configurable
let cachedPrices = {};

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function fmt(n, dec=2){ return parseFloat(n||0).toFixed(dec); }
function fmtK(n){ n=parseFloat(n||0); return n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n.toFixed(2); }
function pct(n){ const v=parseFloat(n||0); return (v>=0?'+':'')+v.toFixed(2)+'%'; }
function usdt(n){ const v=parseFloat(n||0); return (v>=0?'+':'')+v.toFixed(2)+' USDT'; }
function toEur(u){ return (parseFloat(u||0)/EUR_RATE).toFixed(2)+' EUR'; }
function now(){ return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function distPct(from, to){ return ((to-from)/Math.abs(from)*100).toFixed(2); }

// ════════════════════════════════════════
// TABS
// ════════════════════════════════════════
function showTab(tab, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='cuenta') loadCuenta();
  if(tab==='pos') loadPositions();
  if(tab==='mkt') loadMarket();
  if(tab==='hist') loadHistory();
}

// ════════════════════════════════════════
// API CALL
// ════════════════════════════════════════
async function callAPI(endpoint){
  const res = await fetch(`/.netlify/functions/bitget-positions?endpoint=${endpoint}`);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ════════════════════════════════════════
// PRICES
// ════════════════════════════════════════
async function fetchPrices(symbols){
  try{
    const syms = symbols.map(s=>s.endsWith('USDT')?s:s+'USDT');
    const unique = [...new Set(syms)];
    const url = 'https://api.binance.com/api/v3/ticker/24hr?symbols='+JSON.stringify(unique);
    const data = await fetch(url).then(r=>r.json());
    data.forEach(t=>{ cachedPrices[t.symbol] = {price:parseFloat(t.lastPrice), chg:parseFloat(t.priceChangePercent)}; });
  }catch(e){ console.log('Price fetch error', e); }
}

// ════════════════════════════════════════
// CUENTA
// ════════════════════════════════════════
async function loadCuenta(){
  const el = document.getElementById('cuenta-content');
  el.innerHTML = loading();
  try{
    const data = await callAPI('balance');
    if(data.code !== '00000') throw new Error(data.msg || 'API error');
    const accounts = data.data || [];
    if(!accounts.length){ el.innerHTML = emptyState('Sin cuenta USDT-M activa'); return; }
    const acc = accounts[0]; // USDT-M account
    const bal = parseFloat(acc.accountEquity||0);
    const avail = parseFloat(acc.available||0);
    const margin = parseFloat(acc.locked||acc.unrealizedPL&&0||0);
    const unrealized = parseFloat(acc.unrealizedPL||0);
    const realized = parseFloat(acc.realizedPL||acc.todayProfit||0);
    const marginRatio = parseFloat(acc.marginRatio||0);
    document.getElementById('cuenta-update').textContent = 'Sync: '+now();
    el.innerHTML = `
      <div class="balance-hero">
        <div class="balance-label">Balance Total USDT-M</div>
        <div class="balance-amount ${bal>=0?'up':''}">${fmtK(bal)} <span style="font-size:18px;opacity:0.5">USDT</span></div>
        <div class="balance-eur">≈ ${toEur(bal)}</div>
        <div class="balance-row">
          <div class="balance-item">
            <div class="bl">Disponible</div>
            <div class="bv" style="color:var(--green)">${fmtK(avail)}</div>
          </div>
          <div class="balance-item">
            <div class="bl">En Margen</div>
            <div class="bv" style="color:var(--blue)">${fmtK(parseFloat(acc.frozen||0)+parseFloat(acc.locked||0))}</div>
          </div>
          <div class="balance-item">
            <div class="bl">Ratio Margen</div>

// POSICIONES

async function loadPositions(){
  const el = document.getElementById('pos-content');
  el.innerHTML = loading();
  try{
    const data = await callAPI('positions');
    if(data.code !== '00000') throw new Error(data.msg || 'API error');
    const positions = (data.data||[]).filter(p=>parseFloat(p.total||0)>0);
    if(!positions.length){ el.innerHTML = emptyState('No hay posiciones abiertas'); return; }
    // Fetch prices for all symbols
    await fetchPrices(positions.map(p=>p.symbol));
    let html = '';
    positions.forEach(pos=>{
      const sym = pos.symbol; // e.g. BTCUSDT
      const base = sym.replace('USDT','');
      const side = (pos.holdSide||'').toLowerCase(); // long/short
      const lev = parseInt(pos.leverage||1);
      const entry = parseFloat(pos.openPriceAvg||pos.averageOpenPrice||0);
      const markPrice = parseFloat(pos.markPrice||0);
      const priceSrc = cachedPrices[sym]?.price || markPrice;
      const size = parseFloat(pos.total||0);
      const marginSize = parseFloat(pos.marginSize||0);
      const unrealized = parseFloat(pos.unrealizedPL||0);
      const roe = marginSize>0 ? (unrealized/marginSize*100) : 0;
      const sl = parseFloat(pos.stopLossPrice||0);
      const tp = parseFloat(pos.takeProfitPrice||0);
      const liqPrice = parseFloat(pos.liquidationPrice||0);
      const dSL = sl>0?distPct(priceSrc,sl):'—';
      const dTP = tp>0?distPct(priceSrc,tp):'—';
      const dLiq = liqPrice>0?distPct(priceSrc,liqPrice):'—';

      html += `
      <div class="pos">
        <div class="pos-top">
          <div>
            <div class="pos-sym">${base}<span style="font-size:11px;color:var(--muted)">/USDT</span></div>
            <div class="pos-badges">
              <span class="badge badge-${side}">${side.toUpperCase()}</span>
              <span class="badge badge-lev">${lev}x</span>
            </div>
          </div>
          <div class="pos-roe">
            <div class="rv ${roe>=0?'up':'down'}">${(roe>=0?'+':'')+fmt(roe)}%</div>
            <div class="rl">ROE</div>
            <div style="font-size:11px;font-family:var(--mono);margin-top:4px;color:${unrealized>=0?'var(--green)':'var(--red)'}">${usdt(unrealized)}</div>
          </div>
        </div>

        <div class="pos-stats">
          <div class="ps-item">
            <div class="l">ENTRADA</div>
            <div class="v">${entry>0?entry.toLocaleString('es-ES'):'—'}</div>
          </div>
          <div class="ps-item">
            <div class="l">ACTUAL</div>
            <div class="v">${priceSrc>0?priceSrc.toLocaleString('es-ES'):'—'}</div>
          </div>
          <div class="ps-item">
            <div class="l">MARGEN</div>
            <div class="v">${fmt(marginSize)} USDT</div>
          </div>
        </div>

        <div class="pos-stats" style="margin-top:0;margin-bottom:12px">
          <div class="ps-item">
            <div class="l">TAMAÑO</div>
            <div class="v">${size} ${base}</div>
          </div>
          <div class="ps-item">
            <div class="l">POSICIÓN $</div>
            <div class="v">${fmtK(size*priceSrc)}</div>
          </div>
          <div class="ps-item">
            <div class="l">EUR</div>
            <div class="v">${toEur(unrealized)}</div>
          </div>
        </div>

        <div class="pos-levels">
          ${sl>0?`<div class="lvl">
            <span class="ll">🔴 SL</span>
            <span class="lp">${sl.toLocaleString('es-ES')} USDT</span>
            <span class="ld down">${dSL}%</span>
          </div>`:''}
          ${tp>0?`<div class="lvl">
            <span class="ll">🎯 TP</span>
            <span class="lp">${tp.toLocaleString('es-ES')} USDT</span>
            <span class="ld up">+${dTP}%</span>
          </div>`:''}
          ${liqPrice>0?`<div class="lvl" style="border:1px solid rgba(255,61,107,0.2)">
            <span class="ll" style="color:var(--red)">⚡ LIQ</span>
            <span class="lp" style="color:var(--red)">${liqPrice.toLocaleString('es-ES')} USDT</span>
            <span class="ld down">${dLiq}%</span>
          </div>`:''}
        </div>
      </div>`;
    });
    el.innerHTML = html;
  }catch(e){
    el.innerHTML = errBox(e.message);
  }
}

async function loadMarket(){
  const el = document.getElementById('mkt-content');
  el.innerHTML = loading();
  try{
    // Parallel fetches
    const [btcTicker, ethTicker, fundBtc, fundEth, lsBtc, oiBtc, fg, dxy, sp500] = await Promise.allSettled([
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT').then(r=>r.json()),
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/premiumIndex?symbol=ETHUSDT').then(r=>r.json()),
      fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=1h&limit=1').then(r=>r.json()),
      fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT').then(r=>r.json()),
      fetch('https://api.alternative.me/fng/?limit=1').then(r=>r.json()),
      fetch('https://query1.finance.yahoo.com/v8/finance/chart/DX-Y.NYB?interval=1d&range=2d').then(r=>r.json()),
      fetch('https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?interval=1d&range=2d').then(r=>r.json()),
    ]);

    const get = (r, fn) => { try{ return r.status==='fulfilled'?fn(r.value):null }catch(e){return null} };

    const btcP = get(btcTicker, d=>parseFloat(d.lastPrice));
    const btcC = get(btcTicker, d=>parseFloat(d.priceChangePercent));
    const ethP = get(ethTicker, d=>parseFloat(d.lastPrice));
    const ethC = get(ethTicker, d=>parseFloat(d.priceChangePercent));
    const frBtc = get(fundBtc, d=>parseFloat(d.lastFundingRate)*100);
    const frEth = get(fundEth, d=>parseFloat(d.lastFundingRate)*100);
    const ls = get(lsBtc, d=>parseFloat(d[0]?.longShortRatio));
    const oiRaw = get(oiBtc, d=>parseFloat(d.openInterest)*(btcP||0));
    const fgVal = get(fg, d=>parseInt(d.data[0].value));
    const fgLabel = get(fg, d=>d.data[0].value_classification);
    const dxyV = get(dxy, d=>{ const c=d.chart.result[0].indicators.quote[0].close; return c[c.length-1]; });
    const dxyC = get(dxy, d=>{ const c=d.chart.result[0].indicators.quote[0].close; return (c[c.length-1]-c[c.length-2])/c[c.length-2]*100; });
    const spV = get(sp500, d=>{ const c=d.chart.result[0].indicators.quote[0].close; return c[c.length-1]; });
    const spC = get(sp500, d=>{ const c=d.chart.result[0].indicators.quote[0].close; return (c[c.length-1]-c[c.length-2])/c[c.length-2]*100; });

    // Fear & Greed color
    const fgColor = fgVal<=25?'var(--red)':fgVal<=45?'var(--yellow)':fgVal<=55?'var(--text)':fgVal<=75?'var(--green)':'var(--purple)';

    // Signals
    let signals = [], bulls=0, bears=0;
    if(frBtc!=null){ if(frBtc>0.05){signals.push({k:'Funding BTC',v:(frBtc>=0?'+':'')+frBtc.toFixed(4)+'%',s:'⚠️ Longs sobrecargados',c:'var(--red)'});bears++;}else if(frBtc<-0.01){signals.push({k:'Funding BTC',v:(frBtc>=0?'+':'')+frBtc.toFixed(4)+'%',s:'✅ Shorts dominan',c:'var(--green)'});bulls++;}else{signals.push({k:'Funding BTC',v:(frBtc>=0?'+':'')+frBtc.toFixed(4)+'%',s:'Neutral',c:'var(--muted)'});} }
    if(ls!=null){ if(ls>1.5){signals.push({k:'Long/Short BTC',v:ls.toFixed(2),s:'⚠️ Exceso longs',c:'var(--red)'});bears++;}else if(ls<0.8){signals.push({k:'Long/Short BTC',v:ls.toFixed(2),s:'✅ Shorts dominan',c:'var(--green)'});bulls++;}else{signals.push({k:'Long/Short BTC',v:ls.toFixed(2),s:'Equilibrado',c:'var(--muted)'});} }
    if(fgVal!=null){ if(fgVal<=25){signals.push({k:'Fear & Greed',v:fgVal+'/100',s:'✅ Miedo extremo → contrarian alcista',c:'var(--green)'});bulls++;}else if(fgVal>=75){signals.push({k:'Fear & Greed',v:fgVal+'/100',s:'⚠️ Codicia extrema',c:'var(--red)'});bears++;}else{signals.push({k:'Fear & Greed',v:fgVal+'/100',s:fgLabel||'',c:'var(--muted)'});} }
    if(dxyC!=null){ if(dxyC>0.5){signals.push({k:'DXY',v:(dxyC>=0?'+':'')+dxyC.toFixed(2)+'%',s:'⚠️ Dólar fuerte → presión bajista',c:'var(--red)'});bears++;}else if(dxyC<-0.3){signals.push({k:'DXY',v:dxyC.toFixed(2)+'%',s:'✅ Dólar débil → favorable crypto',c:'var(--green)'});bulls++;}else{signals.push({k:'DXY',v:(dxyC>=0?'+':'')+dxyC.toFixed(2)+'%',s:'Neutral',c:'var(--muted)'});} }
    if(spC!=null){ if(spC>1){signals.push({k:'S&P 500',v:(spC>=0?'+':'')+spC.toFixed(2)+'%',s:'✅ Risk-on',c:'var(--green)'});bulls++;}else if(spC<-1){signals.push({k:'S&P 500',v:spC.toFixed(2)+'%',s:'⚠️ Risk-off → precaución',c:'var(--red)'});bears++;}else{signals.push({k:'S&P 500',v:(spC>=0?'+':'')+spC.toFixed(2)+'%',s:'Neutral',c:'var(--muted)'});} }

    const conclusion = bulls>bears
      ? `<div class="conclusion bull">🟢 CONTEXTO ALCISTA — ${bulls} señales bullish vs ${bears} bearish</div>`
      : bears>bulls
        ? `<div class="conclusion bear">🔴 CONTEXTO BAJISTA — ${bears} señales bearish vs ${bulls} bullish</div>`
        : `<div class="conclusion mix">🟡 CONTEXTO MIXTO — esperar confirmación técnica</div>`;

    document.getElementById('mkt-update').textContent = 'Sync: '+now();

    el.innerHTML = `
      <div class="sec">Precios</div>
      <div class="mkt-grid">
        <div class="mkt-card">
          <div class="ml">BTC/USDT</div>
          <div class="mv">${btcP?btcP.toLocaleString('es-ES'):'—'}</div>
          <div class="mc ${(btcC||0)>=0?'up':'down'}">${btcC!=null?pct(btcC):'—'}</div>
          <div class="ms">Bitcoin</div>
        </div>
        <div class="mkt-card">
          <div class="ml">ETH/USDT</div>
          <div class="mv">${ethP?ethP.toLocaleString('es-ES'):'—'}</div>
          <div class="mc ${(ethC||0)>=0?'up':'down'}">${ethC!=null?pct(ethC):'—'}</div>
          <div class="ms">Ethereum</div>
        </div>
      </div>

      <div class="sec">Futuros</div>
      <div class="mkt-grid">
        <div class="mkt-card">
          <div class="ml">Funding BTC</div>
          <div class="mv" style="font-size:16px;color:${frBtc!=null&&frBtc>0.05?'var(--red)':frBtc!=null&&frBtc<-0.01?'var(--green)':'var(--text)'}">${frBtc!=null?(frBtc>=0?'+':'')+frBtc.toFixed(4)+'%':'—'}</div>
          <div class="ms">${frBtc!=null&&frBtc>0.05?'⚠️ Sobrecargado':frBtc!=null&&frBtc<-0.01?'✅ Shorts dominan':'Neutral'}</div>
        </div>
        <div class="mkt-card">
          <div class="ml">Funding ETH</div>
          <div class="mv" style="font-size:16px;color:${frEth!=null&&frEth>0.05?'var(--red)':frEth!=null&&frEth<-0.01?'var(--green)':'var(--text)'}">${frEth!=null?(frEth>=0?'+':'')+frEth.toFixed(4)+'%':'—'}</div>
          <div class="ms">${frEth!=null&&frEth>0.05?'⚠️ Sobrecargado':frEth!=null&&frEth<-0.01?'✅ Shorts dominan':'Neutral'}</div>
        </div>
        <div class="mkt-card">
          <div class="ml">L/S Ratio BTC</div>
          <div class="mv" style="font-size:16px;color:${ls!=null&&ls>1.5?'var(--red)':ls!=null&&ls<0.8?'var(--green)':'var(--text)'}">${ls!=null?ls.toFixed(2):'—'}</div>
          <div class="ms">${ls!=null&&ls>1.5?'⚠️ Exceso longs':ls!=null&&ls<0.8?'✅ Exceso shorts':'Equilibrado'}</div>
        </div>
        <div class="mkt-card">
          <div class="ml">Open Interest BTC</div>
          <div class="mv" style="font-size:16px">${oiRaw!=null?fmtK(oiRaw):'—'}</div>
          <div class="ms">USD</div>
        </div>
      </div>

      <div class="sec">Sentimiento</div>
      <div class="fg-card">
        <div class="fg-ring" style="border-color:${fgColor||'var(--border)'};color:${fgColor||'var(--text)'}">
          ${fgVal!=null?fgVal:'—'}
        </div>
        <div class="fg-info">
          <div class="fl">Fear & Greed Index</div>
          <div class="fv" style="color:${fgColor||'var(--text)'}">${fgLabel||'Cargando...'}</div>
          <div class="fs">${fgVal!=null?'Escala 0–100':'—'}</div>
        </div>
      </div>

      <div class="sec">Macro</div>
      <div class="mkt-grid">
        <div class="mkt-card">
          <div class="ml">DXY</div>
          <div class="mv" style="font-size:16px;color:${dxyC!=null&&dxyC>0.5?'var(--red)':dxyC!=null&&dxyC<-0.3?'var(--green)':'var(--text)'}">${dxyV!=null?dxyV.toFixed(2):'—'}</div>
          <div class="mc ${dxyC!=null&&dxyC>=0?'down':'up'}" style="font-size:10px">${dxyC!=null?(dxyC>=0?'+':'')+dxyC.toFixed(2)+'%':'—'}</div>
          <div class="ms">Índice dólar</div>
        </div>
        <div class="mkt-card">
          <div class="ml">S&P 500</div>
          <div class="mv" style="font-size:16px;color:${spC!=null&&spC>=0?'var(--green)':'var(--red)'}">${spV!=null?spV.toFixed(0):'—'}</div>
          <div class="mc ${spC!=null&&spC>=0?'up':'down'}" style="font-size:10px">${spC!=null?(spC>=0?'+':'')+spC.toFixed(2)+'%':'—'}</div>
          <div class="ms">Correlación BTC</div>
        </div>
        <div class="mkt-card">
          <div class="ml">FED Rate</div>
          <div class="mv" style="font-size:16px">4.25%</div>
          <div class="ms">Tipo de interés</div>

    el.innerHTML = errBox(e.message);
  }
}

// ════════════════════════════════════════
// HISTORIAL
// ════════════════════════════════════════
async function loadHistory(){
  const el = document.getElementById('hist-content');
  el.innerHTML = loading();
  try{
    const data = await callAPI('history');
    if(data.code !== '00000') throw new Error(data.msg || 'API error');
    const fills = data.data?.fillList || data.data || [];
    if(!fills.length){ el.innerHTML = emptyState('Sin trades cerrados en los últimos 90 días'); return; }

    // Group by orderId or show individual fills
    let totalPnl = 0;
    let html = '';
    fills.forEach(f=>{
      const sym = f.symbol||'';
      const base = sym.replace('USDT','');
      const side = f.side||f.tradeSide||'';
      const pnl = parseFloat(f.profit||f.realizedPL||f.pnl||0);
      const price = parseFloat(f.fillPrice||f.price||0);
      const qty = parseFloat(f.baseVolume||f.size||0);
      const fee = parseFloat(f.feeDetail?.totalFee||f.fee||0);
      const ts = parseInt(f.cTime||f.createTime||Date.now());
      const dateStr = new Date(ts).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      totalPnl += pnl;

      html += `
      <div class="hist-item">
        <div class="hist-top">
          <div class="hist-sym">${base}<span style="font-size:11px;opacity:0.5">/USDT</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge ${side.toLowerCase().includes('long')||side.toLowerCase()==='buy'?'badge-long':'badge-short'}">${side.toUpperCase()}</span>
            <span class="hist-date">${dateStr}</span>
          </div>
        </div>
        <div class="hist-grid">
          <div class="hist-item2">Precio: <span>${price>0?price.toLocaleString('es-ES'):'—'}</span></div>
          <div class="hist-item2">Qty: <span>${qty} ${base}</span></div>
          <div class="hist-item2">Fee: <span>${fee!=0?fee.toFixed(4)+' USDT':'—'}</span></div>
          <div class="hist-item2">EUR: <span>${toEur(pnl)}</span></div>
        </div>
        <div class="hist-pnl ${pnl>=0?'up':'down'}">${usdt(pnl)}</div>
      </div>`;
    });

    el.innerHTML = `
      <div class="pnl-strip" style="margin-bottom:16px">
        <div class="pnl-card ${totalPnl>=0?'green':'red'}">
          <div class="pl">Total Realizado</div>
          <div class="pv ${totalPnl>=0?'up':'down'}">${usdt(totalPnl)}</div>
          <div class="ps">${toEur(totalPnl)}</div>
        </div>
        <div class="pnl-card blue">
          <div class="pl">Trades</div>
          <div class="pv" style="color:var(--blue)">${fills.length}</div>
          <div class="ps">últimos 90 días</div>
        </div>
      </div>
      <div class="sec">Detalle de Operaciones</div>
      ${html}
    `;
  }catch(e){
    el.innerHTML = errBox(e.message);
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function loading(){
  return `<div style="text-align:center;padding:60px 0;color:var(--muted)">
    <div class="spin" style="width:24px;height:24px;margin:0 auto 12px"></div>
    <div style="font-size:12px;font-family:var(--mono)">Cargando...</div>
  </div>`;
}

function emptyState(msg){
  return `<div class="empty">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p>${msg}</p>
  </div>`;
}

function errBox(msg){
  return `<div class="err-pill">⚠️ Error: ${msg}</div>
  <div style="font-size:11px;color:var(--muted);padding:8px 12px;font-family:var(--mono)">
    Verifica que la API key de Bitget tiene permisos de lectura para USDT-M y que las variables de entorno están configuradas en Netlify.
  </div>`;
}

// ════════════════════════════════════════
// INIT — Auto-refresh cada 30s
// ════════════════════════════════════════
window.addEventListener('load', ()=>{
  loadCuenta();
  setInterval(()=>{
    const activeTab = document.querySelector('.tab.active');
    const activeLabel = activeTab?.textContent?.trim();
    if(activeLabel==='CUENTA') loadCuenta();
    if(activeLabel==='POSICIONES') loadPositions();
    if(activeLabel==='MERCADO') loadMarket();
    if(activeLabel==='HISTORIAL') loadHistory();
  }, 30000);
});
